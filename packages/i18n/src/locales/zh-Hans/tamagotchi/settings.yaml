allow-visible-on-all-workspaces:
  title: 跨桌面可见性
  description: 允许窗口在所有虚拟桌面中可见，仅限 macOS。
pages:
  modules:
    mcp-server:
      description: 连接与管理 MCP 服务器和工具
      title: MCP 服务器
  system:
    sections:
      section:
        window-shortcuts:
          title: 键盘快捷键
    window-shortcuts:
      description: 修改窗口快捷方式
      title: 窗口快捷方式
      toggle-move:
        label: 切换移动状态
      toggle-resize:
        label: 调整大小
      toggle-ignore-mouse-event:
        label: 忽略鼠标事件
      press-keys: 请按下按键...
    developer:
      sections:
        section:
          use-window-mouse:
            title: 使用窗口鼠标工具
            description: 测试 Electron 窗口鼠标位置
    memory-advanced:
      title: 高级设置
      description: 配置系统的高级功能
      info:
        title: 系统高级功能
        description: 这些功能默认关闭，启用后可以增强 AI 的记忆能力和对话体验。所有功能都经过精心设计，确保向后兼容。
      isolation:
        title: 记忆隔离
        multi-user:
          label: 启用多用户识别
          description: 根据设备自动识别不同用户，为每个用户维护独立的记忆空间
          warning: 首次启用会自动迁移现有数据到新用户，原有数据不会丢失
      semantic:
        title: 语义理解
        search:
          label: 启用语义搜索
          description: 使用知识图谱扩展关键词，提高记忆召回的准确率和覆盖面
        value-judgment:
          label: 智能价值判断
          description: AI 二次评估记忆价值，自动过滤临时性和低价值信息
      natural:
        title: 自然对话
        conversation-init:
          label: 对话初始化
          description: 根据记忆生成个性化开场白，让每次对话更自然
        output:
          label: 自然输出节奏
          description: 在句子间添加停顿，模拟真实的思考过程
        output-delay:
          label: 停顿时长
          description: 句子间停顿的时间（毫秒）
        semantic-segmentation:
          label: 启用语义分段
          description: 根据语义将回复拆分成多个片段，而不是简单按句子分段
          badge: 推荐
        bubble-delay:
          label: 气泡间延迟时间
          description: 多个气泡之间的延迟时间（毫秒），范围 500-5000ms
        adaptive-bubble-delay:
          label: 启用自适应气泡延迟
          description: 根据下一个气泡的文字数量自动调整延迟时间（启用后将覆盖固定延迟设置）
        typing-speed:
          label: 打字机速度
          description: 气泡内文字逐字显示的速度（毫秒/字符），范围 10-100ms
      message:
        title: 消息处理
        merging:
          label: 启用消息合并
          description: 连续发送多条消息时，自动合并后一起处理
          badge: 推荐
        merge-delay:
          label: 合并等待时间
          description: 等待多久后合并消息（毫秒）
      proactive:
        title: 主动话题
        experimental: 实验性功能
        enable:
          label: 启用主动话题
          description: AI 会在合适时机主动发起对话，提醒待办事项或关心近况
        random-interval:
          label: 启用随机间隔
          description: 让 AI 在随机时间主动说话，更自然不刻意
        interval:
          label: 检查间隔
          description: 多久检查一次待发起话题（分钟）
        min-interval:
          label: 最小间隔
          description: 随机间隔的最小值（分钟）
        max-interval:
          label: 最大间隔
          description: 随机间隔的最大值（分钟）
        time-range:
          label: 允许时间段
          description: AI 可以主动发起对话的时间范围（24小时制）
          unit: 时
      reset: 重置为默认值
devtools:
  title: 开发者选项
  pages:
    context-flow:
      title: Context Flow
    lag-visualizer:
      title: Lag 可视化
    performance-visualizer:
      title: 性能可视化
      description: 切换 FPS/长任务/内存叠加
    markdown-stress:
      title: Markdown Stress
      description: 用大量聊天负载来测试 Markdown 的解析和渲染能力
    widgets-calling:
      title: 挂件调用
screen-capture:
  permissions-prompt:
    title: 屏幕捕获
    description: 要捕获屏幕或窗口，需要屏幕和系统音频录制权限。
    open-preferences: 打开系统偏好设置
    dismiss: 取消
    instructions:
      step-1: 打开「系统首选项」，从侧边栏选择「隐私与安全」。
      step-2: 在「屏幕和系统音频录制」和「系统音频录制」部分中，开启 AIRI 的开关。
      step-2-note: 如果没有列出 AIRI，请通过单击「+」按钮和从应用程序文件夹中选择 AIRI 来手动添加。
