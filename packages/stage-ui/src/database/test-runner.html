<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆系统测试运行器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 30px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 150px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .console-output {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .console-output:empty::before {
      content: '等待测试运行...';
      color: #858585;
      font-style: italic;
    }

    .status {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .status-item {
      flex: 1;
      text-align: center;
    }

    .status-label {
      font-size: 12px;
      color: #6c757d;
      margin-bottom: 5px;
    }

    .status-value {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }

    .status-value.success {
      color: #28a745;
    }

    .status-value.danger {
      color: #dc3545;
    }

    .info-box {
      background: #e7f3ff;
      border-left: 4px solid #2196F3;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 4px;
    }

    .info-box h3 {
      color: #1976D2;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .info-box ul {
      margin-left: 20px;
      color: #333;
    }

    .info-box li {
      margin: 5px 0;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .log-success {
      color: #4caf50;
    }

    .log-error {
      color: #f44336;
    }

    .log-warning {
      color: #ff9800;
    }

    .log-info {
      color: #2196F3;
    }

    @media (max-width: 768px) {
      .button-group {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .status {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧠 记忆系统测试运行器</h1>
      <p>完整的记忆系统功能验证工具</p>
    </div>

    <div class="content">
      <div class="info-box">
        <h3>📋 使用说明</h3>
        <ul>
          <li><strong>完整测试</strong>: 运行所有测试，包括数据库操作（推荐）</li>
          <li><strong>快速测试</strong>: 仅测试规则匹配，不涉及数据库</li>
          <li><strong>清理数据</strong>: 删除所有测试产生的记忆数据</li>
          <li><strong>查看数据库</strong>: 打开开发者工具 → Application → IndexedDB → airi-notebook</li>
        </ul>
      </div>

      <div class="status" id="status" style="display: none;">
        <div class="status-item">
          <div class="status-label">总测试数</div>
          <div class="status-value" id="total">0</div>
        </div>
        <div class="status-item">
          <div class="status-label">通过</div>
          <div class="status-value success" id="passed">0</div>
        </div>
        <div class="status-item">
          <div class="status-label">失败</div>
          <div class="status-value danger" id="failed">0</div>
        </div>
        <div class="status-item">
          <div class="status-label">通过率</div>
          <div class="status-value" id="passRate">0%</div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-primary" onclick="runFullTest()" id="btnFull">
          运行完整测试
        </button>
        <button class="btn-secondary" onclick="runQuickTest()" id="btnQuick">
          运行快速测试
        </button>
        <button class="btn-success" onclick="openDevTools()">
          查看数据库
        </button>
        <button class="btn-danger" onclick="cleanupData()" id="btnCleanup">
          清理测试数据
        </button>
      </div>

      <div class="console-output" id="console"></div>
    </div>
  </div>

  <script type="module">
    // 拦截 console.log 并显示在页面上
    const consoleDiv = document.getElementById('console')
    const originalLog = console.log
    const originalError = console.error
    const originalWarn = console.warn

    function appendLog(message, type = 'info') {
      const line = document.createElement('div')
      line.className = `log-${type}`
      line.textContent = message
      consoleDiv.appendChild(line)
      consoleDiv.scrollTop = consoleDiv.scrollHeight
    }

    console.log = (...args) => {
      originalLog(...args)
      const message = args.map(arg =>
        typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
      ).join(' ')

      // 根据内容判断类型
      let type = 'info'
      if (message.includes('✅') || message.includes('成功') || message.includes('通过')) {
        type = 'success'
      } else if (message.includes('❌') || message.includes('失败')) {
        type = 'error'
      } else if (message.includes('⚠️') || message.includes('警告')) {
        type = 'warning'
      }

      appendLog(message, type)
    }

    console.error = (...args) => {
      originalError(...args)
      appendLog(args.join(' '), 'error')
    }

    console.warn = (...args) => {
      originalWarn(...args)
      appendLog(args.join(' '), 'warning')
    }

    // 清空控制台
    console.clear = () => {
      consoleDiv.innerHTML = ''
    }

    // 更新状态显示
    function updateStatus(results) {
      const statusDiv = document.getElementById('status')
      statusDiv.style.display = 'flex'

      document.getElementById('total').textContent = results.total
      document.getElementById('passed').textContent = results.passed
      document.getElementById('failed').textContent = results.total - results.passed
      document.getElementById('passRate').textContent = results.passRate + '%'
    }

    // 禁用/启用按钮
    function setButtonsDisabled(disabled) {
      document.getElementById('btnFull').disabled = disabled
      document.getElementById('btnQuick').disabled = disabled
      document.getElementById('btnCleanup').disabled = disabled
    }

    // 运行完整测试
    window.runFullTest = async function() {
      try {
        setButtonsDisabled(true)
        console.clear()
        console.log('开始运行完整测试...\n')

        const { runAllTests } = await import('./test-notebook.ts')
        const results = await runAllTests()

        updateStatus(results)
        setButtonsDisabled(false)
      } catch (error) {
        console.error('测试执行失败:', error)
        setButtonsDisabled(false)
      }
    }

    // 运行快速测试
    window.runQuickTest = async function() {
      try {
        setButtonsDisabled(true)
        console.clear()
        console.log('开始运行快速测试...\n')

        const { runQuickTests } = await import('./test-notebook.ts')
        const results = runQuickTests()

        updateStatus(results)
        setButtonsDisabled(false)
      } catch (error) {
        console.error('测试执行失败:', error)
        setButtonsDisabled(false)
      }
    }

    // 清理测试数据
    window.cleanupData = async function() {
      try {
        setButtonsDisabled(true)
        console.clear()
        console.log('开始清理测试数据...\n')

        const { cleanupTestData } = await import('./test-notebook.ts')
        await cleanupTestData()

        console.log('\n✅ 清理完成')
        setButtonsDisabled(false)
      } catch (error) {
        console.error('清理失败:', error)
        setButtonsDisabled(false)
      }
    }

    // 打开开发者工具
    window.openDevTools = function() {
      console.log('请按 F12 打开开发者工具，然后切换到 Application 标签查看 IndexedDB')
      alert('请按 F12 打开开发者工具\n然后切换到 Application 标签\n展开 IndexedDB → airi-notebook')
    }

    // 页面加载完成后的提示
    console.log('测试运行器已就绪')
    console.log('点击上方按钮开始测试\n')
  </script>
</body>
</html>
